name: Build JASP Module (Reusable)

on:
  workflow_call:
    secrets:
      GITHUB_PAT: 
        required: false

jobs:
  build:
    strategy:
      matrix:
        os: [macos-14, windows-latest]
        
    runs-on: ${{ matrix.os }}

    steps:
      - name: Acknowledge Build Request
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Checkout PR Branch
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.2'

      - name: Install system dependencies on macOS
        uses: r-hub/actions/setup-r-sysreqs@v1
        with:
          type: full

      - name: Install jaspModuleTools
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          install.packages("remotes", repos = "https://cloud.r-project.org")
          remotes::install_github("jasp-stats/jaspModuleTools")
        shell: Rscript {0}

      - name: Build Module
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jaspModuleTools::compile("./", workdir = "./workdir", resultdir='./bundles_build')
        shell: Rscript {0}

      - name: Upload Bundle Artifact
        uses: actions/upload-artifact@v7
        with:
          name: jasp-bundle-${{ matrix.os }}
          path: ./**/*.JASPModule
          if-no-files-found: error

  comment-with-download:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Post Download Link to PR
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commentBody = `### ✅ Build Complete!\n\nYour JASP module bundles have been successfully built for macOS (ARM) and Windows.\n\n👉 **[Click here to download the artifacts](${runUrl})**\n\n*(Scroll to the bottom of the page to find the "Artifacts" section).*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
